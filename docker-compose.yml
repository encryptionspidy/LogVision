version: '3.8'

services:
  log-analyzer:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - DB_PATH=/app/data/logs.db
      - MONITOR_LOG_PATH=/app/logs/monitor.log
      - MONITOR_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
