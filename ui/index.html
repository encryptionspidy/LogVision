<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Intelligent Log & Error Analyzer — Upload and analyze log files for anomalies, severity, and remediation.">
    <title>Log Analyzer — Intelligent Log & Error Analyzer</title>
    <link rel="stylesheet" href="/ui/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="logo-icon">⚡</div>
                <div>
                    <h1>Log Analyzer</h1>
                    <p class="header-subtitle">Intelligent Log & Error Analysis</p>
                </div>
            </div>
            <div class="header-actions">
                <div id="health-status" class="health-badge health-unknown">
                    <span class="health-dot"></span>
                    <span class="health-text">Checking...</span>
                </div>
            </div>
        </header>

        <!-- Upload Section -->
        <section class="upload-section" id="upload-section">
            <div class="glass-card upload-card">
                <div class="upload-zone" id="upload-zone">
                    <div class="upload-icon">📂</div>
                    <h2>Upload Log File</h2>
                    <p>Drag & drop a <code>.log</code> or <code>.txt</code> file, or click to browse</p>
                    <input type="file" id="file-input" accept=".log,.txt" hidden>
                    <button class="btn btn-primary" id="browse-btn">Browse Files</button>
                </div>
                <div class="upload-progress" id="upload-progress" style="display:none;">
                    <div class="spinner"></div>
                    <p id="progress-text">Analyzing...</p>
                </div>
            </div>
        </section>

        <!-- Error Display -->
        <div class="glass-card error-card" id="error-card" style="display:none;">
            <div class="error-header">
                <span class="error-icon">⚠️</span>
                <span id="error-message"></span>
            </div>
            <button class="btn btn-ghost" id="error-dismiss">Dismiss</button>
        </div>

        <!-- Results Section -->
        <section class="results-section" id="results-section" style="display:none;">
            <!-- Summary Cards -->
            <div class="summary-grid" id="summary-grid"></div>

            <!-- Severity Filter -->
            <div class="glass-card filter-card">
                <div class="filter-bar">
                    <span class="filter-label">Filter by Severity:</span>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn severity-critical" data-filter="CRITICAL">Critical</button>
                        <button class="filter-btn severity-high" data-filter="HIGH">High</button>
                        <button class="filter-btn severity-medium" data-filter="MEDIUM">Medium</button>
                        <button class="filter-btn severity-low" data-filter="LOW">Low</button>
                    </div>
                    <button class="btn btn-ghost" id="new-analysis-btn">New Analysis</button>
                </div>
            </div>

            <!-- Results List -->
            <div class="results-list" id="results-list"></div>
        </section>
    </div>

    <script src="/ui/app.js"></script>
</body>
</html>
